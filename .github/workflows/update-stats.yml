name: Update README Stats Cards
on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically once daily at midnight
  workflow_dispatch: # Allows you to trigger the run manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: soulteary/github-readme-stats-action@v1.0.0
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=radical'
          path: profile/stats.svg
          token: ${{ secrets.PAT }}

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add profile/stats.svg
          git commit -m "Update stats card" || exit 0
          git push
